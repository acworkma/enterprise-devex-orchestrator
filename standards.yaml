# Enterprise Standards Configuration
# ═══════════════════════════════════════════════════════════════════
#
# Customize naming conventions, tagging policies, and governance
# baselines for your organization. This file is loaded automatically
# by the Enterprise DevEx Orchestrator.
#
# Reference: Azure Cloud Adoption Framework
