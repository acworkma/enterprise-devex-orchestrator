name: Contract Review Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-intent-legal-contract-review-dev' }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'intent-legal-contract-review' }}

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: contract-review
    outputs:
      containerAppFqdn: ${{ steps.deploy.outputs.containerAppFqdn }}
      containerAppName: ${{ steps.deploy.outputs.containerAppName }}
      containerRegistryName: ${{ steps.deploy.outputs.containerRegistryName }}
      containerRegistryLoginServer: ${{ steps.deploy.outputs.containerRegistryLoginServer }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Preview deployment
        run: |
          az deployment group what-if \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/parameters/${{ inputs.environment || 'dev' }}.parameters.json

      - name: Deploy Bicep
        id: deploy
        run: |
          RESULT=$(az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/parameters/${{ inputs.environment || 'dev' }}.parameters.json \
            --query 'properties.outputs' \
            --output json)

          echo "containerAppFqdn=$(echo $RESULT | jq -r '.containerAppFqdn.value')" >> $GITHUB_OUTPUT
          echo "containerAppName=$(echo $RESULT | jq -r '.containerAppName.value')" >> $GITHUB_OUTPUT
          echo "containerRegistryName=$(echo $RESULT | jq -r '.containerRegistryName.value')" >> $GITHUB_OUTPUT
          echo "containerRegistryLoginServer=$(echo $RESULT | jq -r '.containerRegistryLoginServer.value')" >> $GITHUB_OUTPUT

  build-and-push:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    defaults:
      run:
        working-directory: contract-review
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ needs.deploy-infrastructure.outputs.containerRegistryName }}

      - name: Build and push image
        run: |
          docker build -t ${{ needs.deploy-infrastructure.outputs.containerRegistryLoginServer }}/${{ env.PROJECT_NAME }}:${{ github.sha }} -f src/app/Dockerfile src/app/
          docker push ${{ needs.deploy-infrastructure.outputs.containerRegistryLoginServer }}/${{ env.PROJECT_NAME }}:${{ github.sha }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ needs.deploy-infrastructure.outputs.containerAppName }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ needs.deploy-infrastructure.outputs.containerRegistryLoginServer }}/${{ env.PROJECT_NAME }}:${{ github.sha }}

      - name: Verify health
        run: |
          curl --fail --retry 10 --retry-delay 10 "https://${{ needs.deploy-infrastructure.outputs.containerAppFqdn }}/health"